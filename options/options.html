<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="options.css"/>
  </head>
  <body>
    <p>Optionally add a prefix and suffix before and after the ID on copy.</p>
    <form>
      <label for="prefix">Prefix</label>
      <textarea id="prefix"></textarea>

      <label for="suffix">Suffix</label>
      <textarea id="suffix"></textarea>

      <div class="checkboxes">
        <label><input id="copyBrackets" type="checkbox"/> Include angle brackets (&lt;&gt;)</label>
        <label><input id="urlEncode" type="checkbox"/> URL encode the message ID</label>
        <label><input id="raw" type="checkbox"/> Get raw Message-ID header (e.g. <code>Message-ID: &lt;foo@bar&gt;</code>)</label>
      </div>

      <label for="shortcut">Keyboard shortcut</label>
      <div class="shortcut-controls">
        <input id="shortcut" type="text" readonly/>
        <button id="shortcut-reset" type="button">Reset to default</button>
      </div>
      <p id="shortcut-error" class="shortcut-error"></p>
    </form>
    <script src="options.js"></script>
  </body>
</html>
