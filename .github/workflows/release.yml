name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Get previous tag
        id: prev_tag
        run: |
          prev=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Bump version in manifest.json
        id: version
        run: |
          current=$(jq -r '.version' manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="$major.$minor.$patch"
          jq --arg v "$new" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Build XPI
        run: make

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Increase version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Generate release notes
        id: notes
        run: |
          prev="${{ steps.prev_tag.outputs.tag }}"
          if [ -n "$prev" ]; then
            notes=$(git log "${prev}..HEAD~1" --pretty=format:"- %s" --no-merges)
          else
            notes=$(git log HEAD~1 --pretty=format:"- %s" --no-merges)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: copy-message-id@j.kahn-*.xpi
